project:
  type: book
  output-dir: docs   # GitHub Pages serves from /docs on main branch

book:
  title: "50by35 Microdata Pipeline"
  subtitle: "Harmonize and publish microdata used to monitor the UNHCR 50by35 Vision"
  date: today
  author:
    - name: "World Bank / UNHCR Joint Team"
  repo-url: https://github.com/GPID-WB/50by35-data
  repo-actions: [edit, issue]
  chapters:
    - index.qmd
    - part: "Pipeline"
      chapters:
        - chapters/01-raw-upload.qmd
        - chapters/02-harmonization.qmd
        - chapters/03-review-approval.qmd
    - part: "Access"
      chapters:
        - chapters/04-access.qmd
    - part: "Reference"
      chapters:
        - chapters/05-schema.qmd

bibliography: references.bib

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: true
    code-tools: true

execute:
  freeze: auto                # cache all outputs; re-execute only when source changes
  echo: true
  warning: false

knitr:
  opts_chunk:
    comment: "#>"
